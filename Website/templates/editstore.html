{% extends "layout.html" %}

{% block content %}
<link rel="stylesheet" href="{{url_for('static',filename='editstoreCSS.css')}}" />

<form method="POST" class="storeDetailsEdit">
    <label>Enter store name:</label>
    <input type="text" name="store_name" value="{{ store['store_name'] }}">
    <label>Enter store description:</label>
    <textarea name="description" rows="4">{{ store['description'] }}</textarea>
    <button type="submit" name="form_type" value="update_store">Save Changes</button>
</form>

<hr>

<div class="productManagementContainer">
    <div class="addProductBox">
        <h3>Add new product</h3>
        <form method="POST">
            <label>Product name:</label>
            <input type="text" name="name" required>
            <label>Product price:</label>
            <input type="number" step="0.01" name="price" required>
            <label>Product stock:</label>
            <input type="number" name="stock" required>
            <button type="submit" name="form_type" value="add_product">ADD ITEM</button>
        </form>
    </div>

    <div class="productListScroll">
        <h3>Current Products</h3>
        {% if products %}
        {% for product in products %}
        <form method="POST" class="productCardEdit">
            <input type="hidden" name="product_id" value="{{ product['id'] }}">
            <label>Product name:</label>
            <input type="text" name="name" value="{{ product['name'] }}">
            <label>Product price:</label>
            <input type="number" step="0.01" name="price" value="{{ product['price'] }}">
            <label>Product stock:</label>
            <input type="number" name="stock" value="{{ product['stock'] }}">
            <div class="btnRow">
                <button type="submit" name="form_type" value="edit_product" class="editBtn">EDIT</button>
                <button type="submit" name="form_type" value="delete_product" class="deleteBtn">Delete</button>
            </div>
        </form>
        {% endfor %}
        {% else %}
        <p>No products added yet.</p>
        {% endif %}
    </div>
</div>
{% endblock %}
